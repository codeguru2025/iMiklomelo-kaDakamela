name: imiklomelo-kadakamela
region: nyc

services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: codeguru2025/iMiklomelo-kaDakamela
      branch: main
      deploy_on_push: true
    http_port: 5000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "${db.DATABASE_URL}"
      - key: APP_URL
        scope: RUN_TIME
        value: https://dakamela-n729i.ondigitalocean.app
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
        value: change-me
      - key: ADMIN_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: change-me
      - key: PAYNOW_INTEGRATION_ID
        scope: RUN_TIME
        type: SECRET
        value: change-me
      - key: PAYNOW_INTEGRATION_KEY
        scope: RUN_TIME
        type: SECRET
        value: change-me
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: change-me
      - key: RESEND_FROM_EMAIL
        scope: RUN_TIME
        value: noreply@resend.dev
      - key: DO_SPACES_KEY
        scope: RUN_TIME
        type: SECRET
        value: change-me
      - key: DO_SPACES_SECRET
        scope: RUN_TIME
        type: SECRET
        value: change-me
      - key: DO_SPACES_BUCKET
        scope: RUN_TIME
        value: imiklomelo-uploads
      - key: DO_SPACES_REGION
        scope: RUN_TIME
        value: nyc3
      - key: DO_SPACES_ENDPOINT
        scope: RUN_TIME
        value: https://nyc3.digitaloceanspaces.com
      - key: DO_SPACES_CDN_ENDPOINT
        scope: RUN_TIME
        value: ""

databases:
  - engine: PG
    name: db
    num_nodes: 1
    size: db-s-dev-database
    version: "16"
